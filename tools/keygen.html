<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PASAT-G · Pro Code Generator (local admin tool)</title>
<style>
body{font-family:system-ui,sans-serif;background:#040d12;color:#e8f4f0;max-width:560px;margin:40px auto;padding:0 16px;}
h1{font-size:18px;color:#00FFB2;}
p{font-size:13px;color:#9fb8b0;line-height:1.5;}
label{display:block;font-size:12px;margin:14px 0 4px;color:#9fb8b0;}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #1e3a34;background:#0a1a20;color:#e8f4f0;font-size:14px;box-sizing:border-box;}
button{margin-top:16px;padding:10px 18px;border:none;border-radius:8px;background:#00FFB2;color:#04160f;font-weight:700;cursor:pointer;font-size:14px;}
ol{font-size:14px;line-height:2;}
code,.key{font-family:ui-monospace,monospace;}
.key{font-size:16px;color:#00FFB2;font-weight:700;letter-spacing:1px;}
.warn{font-size:12px;color:#ffb84d;}
</style>
</head>
<body>
<h1>PASAT-G · Pro Unlock Code Generator</h1>
<p>Open this file on your own computer only. It is never served from the live
site (blocked in <code>netlify.toml</code>). Paste the <code>LICENSE_SALT</code>
value from <code>config.js</code>, choose how many codes you need, and generate.</p>
<p class="warn">Keep the salt private — anyone who has it can mint valid codes.</p>

<label for="salt">LICENSE_SALT (from config.js)</label>
<input id="salt" placeholder="PASATG-..." autocomplete="off"/>

<label for="count">How many codes?</label>
<input id="count" type="number" value="5" min="1" max="200"/>

<button onclick="generate()">Generate codes</button>
<ol id="out"></ol>

<script>
// Identical hash + base32 as the app (index.html) — do not change one
// without the other.
function _hash32(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function _b32(n){const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";n=n>>>0;for(let i=0;i<4;i++){s=A[n&31]+s;n=n>>>5;}return s;}
function randBlock(){
  const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  const buf=new Uint8Array(4); crypto.getRandomValues(buf);
  let s=""; for(let i=0;i<4;i++) s+=A[buf[i]%32];
  return s;
}
function generate(){
  const salt=document.getElementById('salt').value.trim();
  const n=Math.min(200,Math.max(1,parseInt(document.getElementById('count').value)||1));
  const out=document.getElementById('out'); out.innerHTML='';
  if(!salt){alert('Paste the LICENSE_SALT from config.js first.');return;}
  const seen=new Set();
  while(seen.size<n){
    const b1=randBlock(), b2=randBlock();
    const chk=_b32(_hash32("PASATG-"+b1+"-"+b2+"|"+salt));
    const code="PASATG-"+b1+"-"+b2+"-"+chk;
    if(seen.has(code)) continue;
    seen.add(code);
    const li=document.createElement('li');
    li.innerHTML='<span class="key">'+code+'</span>';
    out.appendChild(li);
  }
}
</script>
</body>
</html>
