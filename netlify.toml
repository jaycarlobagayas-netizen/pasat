# PASAT-G — Netlify configuration (free tier)
# Pure static site: no build step, no functions, no paid features.

[build]
  publish = "."

# ---- Old installed PWAs pointed at PASAT_G.html; send them home ----
[[redirects]]
  from = "/PASAT_G.html"
  to = "/"
  status = 301

# ---- Never serve the local admin tools folder ----
[[redirects]]
  from = "/tools/*"
  to = "/"
  status = 404
  force = true

# ---- Security headers for every response ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://gc.zgo.at; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.goatcounter.com https://gc.zgo.at; frame-src https://pasatg-75b45.firebaseapp.com; base-uri 'self'; form-action 'self'"

# ---- The app shell must always revalidate (instant updates) ----
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ---- Images never change once deployed: cache for a year ----
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
